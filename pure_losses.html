<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>WMS+</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="https://raw.githubusercontent.com/mevukolov/WMSplus/refs/heads/main/icons/wms_icon.ico">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="ui.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js" defer></script>
    <script src="pure_losses.js" defer></script>

    <style>
        .pure-layout {
            display: grid;
            grid-template-columns: 320px minmax(0, 1fr) 320px;
            gap: 12px;
            align-items: start;
            max-width: 1880px;
            margin: 0 auto;
            padding: 0 10px;
        }

        .pure-side-wrap,
        .pure-center.wrap {
            max-width: none !important;
            width: 100%;
            margin: 0;
        }

        .pure-side-card {
            padding: 14px 16px;
        }

        .pure-side-card .status-header {
            margin-bottom: 10px;
        }

        .pure-center-card {
            min-height: 520px;
        }

        .pure-last-upload-date {
            margin-top: 8px;
            font-size: 13px;
            color: #64748b;
        }

        .pure-status-line {
            margin-top: 12px;
            min-height: 20px;
            font-size: 14px;
            line-height: 1.3;
            color: #334155;
            display: none;
            word-break: break-word;
        }

        .pure-center-toolbar {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 12px;
        }

        .pure-open-table-btn {
            min-height: 40px;
        }

        .pure-full-modal {
            position: fixed;
            inset: 0;
            z-index: 1200;
            display: flex;
        }

        .pure-full-modal.hidden {
            display: none;
        }

        .pure-full-modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.35);
        }

        .pure-full-modal-content {
            position: relative;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .pure-full-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 14px 18px;
            border-bottom: 1px solid #e5e7eb;
            background: #f8fafc;
        }

        .pure-full-modal-title {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
        }

        .pure-modal-close-btn {
            width: 34px;
            height: 34px;
            border-radius: 999px;
            border: 1px solid #cbd5e1;
            background: #fff;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
        }

        .pure-table-toolbar {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            flex-wrap: wrap;
            padding: 12px 16px;
            border-bottom: 1px solid #e5e7eb;
            background: #f3f4f6;
        }

        .pure-filter-field {
            min-width: 250px;
        }

        .pure-filter-field > label {
            display: block;
            font-size: 12px;
            color: #475569;
            margin-bottom: 6px;
        }

        .pure-filter-btn {
            width: 100%;
            justify-content: space-between;
        }

        .pure-table-inline-status {
            min-height: 18px;
            font-size: 13px;
            color: #64748b;
            margin-left: auto;
            align-self: center;
            max-width: 360px;
            text-align: right;
            word-break: break-word;
        }

        .pure-unresolved-toggle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #334155;
            user-select: none;
        }

        .pure-unresolved-toggle input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
        }

        .pure-table-scroll {
            flex: 1;
            overflow: auto;
            background: #ffffff;
        }

        .pure-data-table {
            width: max-content;
            min-width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .pure-data-table th,
        .pure-data-table td {
            border: 1px solid #e5e7eb;
            padding: 8px 10px;
            vertical-align: top;
            background: #ffffff;
        }

        .pure-data-table th {
            position: sticky;
            top: -2px;
            z-index: 5;
            background: #f8fafc;
            font-weight: 600;
            color: #0f172a;
            text-align: left;
            white-space: nowrap;
            cursor: pointer;
            box-shadow: 0 1px 0 #d1d5db;
        }

        .pure-data-table th:not([data-sort-key]) {
            cursor: default;
        }

        .pure-data-table td {
            white-space: nowrap;
        }

        .pure-data-table td.pure-wrap-cell {
            white-space: normal;
            min-width: 170px;
            max-width: 220px;
        }

        .pure-edit-input {
            width: 220px;
            max-width: 100%;
            box-sizing: border-box;
        }

        .pure-edit-input.short {
            width: 180px;
        }

        .pure-edit-input.comment {
            width: 420px;
        }

        .pure-subject-nm {
            white-space: normal;
            line-height: 1.2;
            font-size: 12px;
            color: #475569;
            margin-bottom: 3px;
            font-weight: 600;
        }

        .pure-name-main {
            white-space: normal;
            line-height: 1.25;
        }

        .pure-brand-sub {
            margin-top: 3px;
            font-style: italic;
            color: #64748b;
            white-space: normal;
            line-height: 1.2;
        }

        .pure-sort-indicator {
            margin-left: 6px;
            font-size: 11px;
            opacity: 0.7;
        }

        .pure-col-subject {
            width: 220px;
            min-width: 220px;
            max-width: 260px;
        }

        .pure-col-shk {
            width: 126px;
            min-width: 126px;
            max-width: 136px;
        }

        .pure-col-status {
            width: 102px;
            min-width: 102px;
            max-width: 112px;
            white-space: normal !important;
            line-height: 1.2;
            word-break: break-word;
        }

        .pure-col-date {
            width: 108px;
            min-width: 108px;
            max-width: 118px;
        }

        .pure-col-lr {
            width: 88px;
            min-width: 88px;
            max-width: 96px;
        }

        .pure-gap-col {
            width: 14px;
            min-width: 14px;
            max-width: 14px;
            padding: 0 !important;
            background: #ffffff !important;
            border-left: none !important;
            border-right: none !important;
        }

        .pure-col-extra {
            width: 118px;
            min-width: 118px;
            max-width: 130px;
        }

        .pure-col-wms {
            width: 240px;
            min-width: 240px;
            max-width: 280px;
        }

        .pure-shk-cell {
            text-align: center;
            vertical-align: middle !important;
        }

        .pure-shk-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(100, 116, 139, 0.26);
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.28);
            color: #0f172a;
            font-size: 12px;
            font-weight: 600;
            line-height: 1;
            padding: 6px 10px;
            min-height: 24px;
            box-sizing: border-box;
        }

        .pure-shk-link {
            color: inherit;
            text-decoration: none;
        }

        .pure-shk-link:visited {
            color: inherit;
        }

        .pure-shk-link:hover,
        .pure-shk-link:focus-visible {
            color: inherit;
            text-decoration: none;
        }

        .pure-price-cell {
            font-weight: 600;
        }

        .pure-row-verdict-dropdown {
            position: relative;
            min-width: 190px;
            max-width: 220px;
        }

        .pure-row-verdict-btn {
            width: 100%;
            justify-content: space-between;
            min-height: 34px;
            padding: 7px 10px;
            border-radius: 10px;
            font-size: 13px;
        }

        .pure-row-verdict-panel {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            z-index: 32;
            width: 100%;
            max-height: 260px;
            overflow: auto;
            border-radius: 10px;
            border: 1px solid rgba(15, 23, 42, 0.15);
            background: #ffffff;
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.18);
            padding: 4px;
        }

        .pure-row-verdict-panel.hidden {
            display: none;
        }

        .pure-row-verdict-option {
            display: block;
            width: 100%;
            border: 0;
            background: transparent;
            border-radius: 8px;
            padding: 8px 9px;
            text-align: left;
            font-size: 13px;
            color: #0f172a;
            cursor: pointer;
        }

        .pure-row-verdict-option:hover {
            background: #f3f4f6;
        }

        .pure-row-verdict-option.is-selected {
            background: #ede9fe;
            color: #4c1d95;
            font-weight: 600;
        }

        .pure-row-verdict-dropdown.is-saving {
            opacity: 0.75;
            pointer-events: none;
        }

        .pure-wms-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .pure-wms-popover-wrap {
            position: relative;
            display: inline-flex;
        }

        .pure-wms-btn {
            min-height: 28px;
            padding: 4px 8px;
            font-size: 12px;
            line-height: 1.2;
            border-radius: 8px;
            white-space: nowrap;
        }

        .pure-wms-popover {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            z-index: 30;
            min-width: 260px;
            max-width: 340px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(15, 23, 42, 0.15);
            background: #ffffff;
            color: #111827;
            box-shadow: 0 12px 26px rgba(15, 23, 42, 0.18);
        }

        .pure-wms-popover.hidden {
            display: none;
        }

        .pure-wms-popover-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #0f172a;
        }

        .pure-wms-popover-line {
            font-size: 12px;
            line-height: 1.3;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .pure-wms-popover-key {
            font-weight: 600;
            color: #334155;
        }

        .pure-wms-popover-value {
            color: #111827;
        }

        .pure-wms-popover-photos {
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .pure-wms-photo-btn {
            font-size: 12px;
            padding: 5px 8px;
            border-radius: 8px;
            text-decoration: none;
        }

        .pure-wms-popover-muted {
            font-size: 12px;
            color: #64748b;
        }

        .pure-data-table tr.pure-row-blackout td {
            background: #0f172a !important;
            color: #f8fafc;
            border-color: #1e293b;
        }

        .pure-data-table tr.pure-row-oprihod td {
            background: #5b21b6 !important;
            color: #f8fafc;
            border-color: #6d28d9;
        }

        .pure-data-table tr.pure-row-blackout .pure-subject-nm,
        .pure-data-table tr.pure-row-blackout .pure-brand-sub {
            color: #cbd5e1;
        }

        .pure-data-table tr.pure-row-oprihod .pure-subject-nm,
        .pure-data-table tr.pure-row-oprihod .pure-brand-sub {
            color: #e9d5ff;
        }

        .pure-data-table tr.pure-row-blackout .pure-shk-pill {
            border-color: rgba(226, 232, 240, 0.35);
            background: rgba(148, 163, 184, 0.35);
            color: #f8fafc;
        }

        .pure-data-table tr.pure-row-oprihod .pure-shk-pill {
            border-color: rgba(243, 232, 255, 0.4);
            background: rgba(216, 180, 254, 0.35);
            color: #f8fafc;
        }

        .pure-data-table tr.pure-row-blackout .pure-shk-link,
        .pure-data-table tr.pure-row-blackout .pure-shk-link:visited,
        .pure-data-table tr.pure-row-blackout .pure-shk-link:hover,
        .pure-data-table tr.pure-row-blackout .pure-shk-link:focus-visible {
            color: inherit;
        }

        .pure-data-table tr.pure-row-oprihod .pure-shk-link,
        .pure-data-table tr.pure-row-oprihod .pure-shk-link:visited,
        .pure-data-table tr.pure-row-oprihod .pure-shk-link:hover,
        .pure-data-table tr.pure-row-oprihod .pure-shk-link:focus-visible {
            color: inherit;
        }

        .pure-data-table tr.pure-row-blackout .pure-wms-btn {
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(255, 255, 255, 0.34);
            color: #f8fafc;
        }

        .pure-data-table tr.pure-row-oprihod .pure-wms-btn {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.38);
            color: #f8fafc;
        }

        .pure-data-table tr.pure-row-blackout .pure-wms-btn:hover,
        .pure-data-table tr.pure-row-blackout .pure-wms-btn:focus-visible {
            background: rgba(255, 255, 255, 0.24);
            border-color: rgba(255, 255, 255, 0.5);
            color: #ffffff;
        }

        .pure-data-table tr.pure-row-blackout .pure-row-verdict-btn {
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(255, 255, 255, 0.34);
            color: #f8fafc;
        }

        .pure-data-table tr.pure-row-blackout .pure-row-verdict-btn:hover,
        .pure-data-table tr.pure-row-blackout .pure-row-verdict-btn:focus-visible {
            background: rgba(255, 255, 255, 0.24);
            border-color: rgba(255, 255, 255, 0.5);
            color: #ffffff;
        }

        .pure-data-table tr.pure-row-oprihod .pure-wms-btn:hover,
        .pure-data-table tr.pure-row-oprihod .pure-wms-btn:focus-visible {
            background: rgba(255, 255, 255, 0.28);
            border-color: rgba(255, 255, 255, 0.56);
            color: #ffffff;
        }

        .pure-data-table tr.pure-row-oprihod .pure-row-verdict-btn {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.38);
            color: #f8fafc;
        }

        .pure-data-table tr.pure-row-oprihod .pure-row-verdict-btn:hover,
        .pure-data-table tr.pure-row-oprihod .pure-row-verdict-btn:focus-visible {
            background: rgba(255, 255, 255, 0.28);
            border-color: rgba(255, 255, 255, 0.56);
            color: #ffffff;
        }

        .pure-data-table tr.pure-row-blackout .input {
            background: rgba(248, 250, 252, 0.98);
            color: #0f172a;
            border-color: #cbd5e1;
        }

        .pure-data-table tr.pure-row-oprihod .input {
            background: rgba(250, 245, 255, 0.98);
            color: #2e1065;
            border-color: #d8b4fe;
        }

        @media (max-width: 1500px) {
            .pure-layout {
                grid-template-columns: 280px minmax(0, 1fr) 280px;
            }

            .pure-filter-field {
                min-width: 220px;
            }
        }

        @media (max-width: 1200px) {
            .pure-layout {
                grid-template-columns: 1fr;
            }

            .pure-center {
                order: 1;
            }

            .pure-side-left {
                order: 2;
            }

            .pure-side-right {
                order: 3;
            }

            .pure-table-inline-status {
                margin-left: 0;
                text-align: left;
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div id="menu-overlay" class="menu-overlay"></div>

<header class="header">
    <button class="btn btn-round header-btn" id="menu-btn">☰</button>
    <span class="header-title">Pure списания</span>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
        <span id="user-name-small" class="user-name"></span>
        <button class="btn btn-round header-btn" id="logout-btn">⎋</button>
    </div>
</header>

<div id="sidebar" class="sidebar">
    <div class="sidebar-content"></div>
</div>

<div class="pure-layout">
    <aside class="wrap pure-side-wrap pure-side-left">
        <div class="card pure-side-card">
            <div class="status-header">
                <div class="status-center" style="grid-column:1 / -1;">
                    <div class="status-code" style="font-size:22px;">Обновить данные</div>
                    <div id="last-upload-date" class="pure-last-upload-date">Последняя выгруженная дата: —</div>
                </div>
            </div>

            <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
                <button id="refresh-btn" class="btn btn-rect">Загрузить .xlsx</button>
                <input type="file" id="file-input" accept=".xlsx,.xls" hidden>
            </div>

            <div id="status-line" class="pure-status-line"></div>
        </div>
    </aside>

    <main class="wrap pure-center" style="max-width:1200px;">
        <div class="card pure-center-card">
            <div class="pure-center-toolbar">
                <button id="open-pure-table-btn" class="btn btn-rect pure-open-table-btn">Открыть таблицу чистых списаний</button>
            </div>
            <h1 style="margin:0 0 14px 0;">Статистика</h1>
        </div>
    </main>

    <aside class="wrap pure-side-wrap pure-side-right">
        <div class="card pure-side-card">
            <div class="status-header">
                <div class="status-center" style="grid-column:1 / -1;">
                    <div class="status-code" style="font-size:22px;">Правая секция</div>
                </div>
            </div>
        </div>
    </aside>
</div>

<div id="pure-table-modal" class="pure-full-modal hidden">
    <div class="pure-full-modal-backdrop" data-close-pure-table="1"></div>
    <div class="pure-full-modal-content">
        <div class="pure-full-modal-header">
            <div class="pure-full-modal-title">Таблица чистых списаний</div>
            <button id="pure-table-close-btn" class="pure-modal-close-btn" type="button" aria-label="Закрыть">✕</button>
        </div>

        <div class="pure-table-toolbar">
            <div class="pure-filter-field">
                <label>Лостризон*</label>
                <div class="status-dropdown">
                    <button class="btn btn-rect status-btn pure-filter-btn" id="pure-filter-lr-btn" type="button">
                        Выбраны все
                        <span class="caret">▾</span>
                    </button>
                    <div class="status-panel hidden" id="pure-filter-lr-panel">
                        <div class="status-title">Лостризон</div>
                        <div class="status-list" id="pure-filter-lr-list"></div>
                    </div>
                </div>
            </div>

            <div class="pure-filter-field">
                <label>Статус до списания*</label>
                <div class="status-dropdown">
                    <button class="btn btn-rect status-btn pure-filter-btn" id="pure-filter-status-btn" type="button">
                        Выбраны все
                        <span class="caret">▾</span>
                    </button>
                    <div class="status-panel hidden" id="pure-filter-status-panel">
                        <div class="status-title">Статус до списания</div>
                        <div class="status-list" id="pure-filter-status-list"></div>
                    </div>
                </div>
            </div>

            <div class="pure-filter-field">
                <label>Дополнительно*</label>
                <div class="status-dropdown">
                    <button class="btn btn-rect status-btn pure-filter-btn" id="pure-filter-extra-btn" type="button">
                        Выбраны все
                        <span class="caret">▾</span>
                    </button>
                    <div class="status-panel hidden" id="pure-filter-extra-panel">
                        <div class="status-title">База WMS+</div>
                        <div class="status-list" id="pure-filter-extra-list"></div>
                    </div>
                </div>
            </div>

            <button id="pure-table-refresh-btn" class="btn btn-rect" type="button">Обновить</button>
            <label class="pure-unresolved-toggle" for="pure-unresolved-only">
                <input id="pure-unresolved-only" type="checkbox">
                Только неразобранные ШК
            </label>
            <div id="pure-table-inline-status" class="pure-table-inline-status"></div>
        </div>

        <div class="pure-table-scroll">
            <table class="pure-data-table">
                <thead id="pure-table-head">
                <tr>
                    <th data-sort-key="shk" class="pure-col-shk">ШК<span class="pure-sort-indicator"></span></th>
                    <th data-sort-key="subject" class="pure-col-subject">Предмет<span class="pure-sort-indicator"></span></th>
                    <th data-sort-key="shkStateBeforeLost" class="pure-col-status">Статус ШК<span class="pure-sort-indicator"></span></th>
                    <th data-sort-key="dateLost" class="pure-col-date">Дата списания<span class="pure-sort-indicator"></span></th>
                    <th data-sort-key="lr" class="pure-col-lr">Лостризон<span class="pure-sort-indicator"></span></th>
                    <th data-sort-key="price">Цена<span class="pure-sort-indicator"></span></th>
                    <th class="pure-gap-col" aria-hidden="true"></th>
                    <th data-sort-key="decision">Вердикт<span class="pure-sort-indicator"></span></th>
                    <th data-sort-key="comment">Комментарий<span class="pure-sort-indicator"></span></th>
                    <th class="pure-col-extra">Таблица ОПП</th>
                    <th class="pure-col-extra pure-col-wms">База WMS+</th>
                </tr>
                </thead>
                <tbody id="pure-table-body">
                <tr>
                    <td colspan="11" class="muted">Нажмите «Открыть таблицу чистых списаний».</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="toasts" class="toasts"></div>

</body>
</html>
