<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>WMS+</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="https://raw.githubusercontent.com/mevukolov/WMSplus/refs/heads/main/icons/wms_icon.ico" type="image/x-icon" />
    <style>
        .tti-side-wrap {
            width: 100%;
        }

        .tti-main-row {
            display: grid;
            grid-template-columns: minmax(240px, 280px) minmax(360px, 520px) minmax(340px, 1fr);
            gap: 16px;
            align-items: start;
        }

        .tti-main-row .card {
            min-width: 0;
        }

        .pure-losses-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 460px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .pure-losses-item {
            border: 1px solid rgba(15,23,42,0.08);
            border-radius: 10px;
            padding: 9px 10px;
            background: #f8fafc;
            color: #1f2937;
        }

        .pure-losses-item.exact-match {
            background: #fff9d8;
            border-color: #facc15;
        }

        .pure-losses-top {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            align-items: center;
            margin-bottom: 4px;
        }

        .pure-losses-title {
            font-weight: 500;
            font-size: 12px;
            font-style: italic;
            color: #475569;
            line-height: 1.2;
        }

        .pure-losses-date {
            font-size: 12px;
            color: #64748b;
            white-space: nowrap;
        }

        .pure-losses-line {
            font-size: 13px;
            line-height: 1.25;
            margin-top: 2px;
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .pure-losses-shk-row {
            margin-bottom: 6px;
        }

        .pure-losses-bottom {
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .pure-losses-lr-line {
            margin-top: 0;
            min-width: 0;
            flex: 1 1 auto;
        }

        .pure-losses-shk-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(100, 116, 139, 0.26);
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.28);
            color: #0f172a;
            font-size: 12px;
            font-weight: 600;
            line-height: 1;
            padding: 6px 10px;
            min-height: 24px;
            box-sizing: border-box;
        }

        .pure-losses-shk-link {
            color: inherit;
            text-decoration: none;
        }

        .pure-losses-shk-link:visited {
            color: inherit;
        }

        .pure-losses-shk-link:hover,
        .pure-losses-shk-link:focus-visible {
            color: inherit;
            text-decoration: none;
        }

        .pure-losses-actions {
            display: flex;
            justify-content: flex-end;
            min-width: 92px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity .12s ease;
        }

        .pure-losses-item:hover .pure-losses-actions,
        .pure-losses-item:focus-within .pure-losses-actions {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .pure-losses-found-btn {
            min-height: 30px;
            padding: 6px 10px;
            font-size: 12px;
            line-height: 1;
            border-color: #f59e0b;
            color: #92400e;
            background: #fef3c7;
        }

        .pure-losses-found-btn:hover {
            background: #fde68a;
        }

        @media (hover: none) {
            .pure-losses-actions {
                opacity: 1;
                visibility: visible;
                pointer-events: auto;
            }
        }

        .pure-losses-empty {
            border: 1px dashed rgba(15,23,42,0.18);
            border-radius: 10px;
            padding: 10px;
            font-size: 13px;
            color: #64748b;
            background: #f8fafc;
        }

        @media (max-width: 1360px) {
            .tti-main-row {
                grid-template-columns: minmax(240px, 280px) minmax(360px, 1fr);
            }

            #pure-losses-group {
                grid-column: 1 / -1;
            }
        }

        @media (max-width: 960px) {
            .tti-main-row {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="ui.js" defer></script>
    <script src="transfer_to_identification.js" defer></script>
</head>

<body>
<div id="menu-overlay" class="menu-overlay"></div>

<header class="header">
    <button class="btn btn-round header-btn" id="menu-btn">☰</button>
    <span class="header-title" id="header-wh"></span>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
        <span id="user-name-small" class="user-name" aria-hidden="true"></span>
        <button class="btn btn-round header-btn" id="logout-btn">⎋</button>
    </div>
</header>

<div id="sidebar" class="sidebar">
    <div class="sidebar-content"></div>
</div>

<main class="wrap" style="max-width:1480px;margin-top:90px;">
    <div id="mh-block" class="card" style="display:none;margin-bottom:20px;">
        <div style="font-size:18px;font-weight:600;">Вы работаете с МХ:</div>
        <div id="mh-name" style="font-size:20px;margin-top:4px;"></div>
    </div>

    <div id="tti-side-wrap" class="tti-side-wrap" style="display:none;">
        <div class="tti-main-row">
            <div class="card" id="photo-group" style="display:none;max-width:100%;">
                <div style="font-weight:600;margin-bottom:6px;">Фото товара</div>
                <div id="photo-status" style="font-size:13px;color:#475569;margin-bottom:8px;"></div>
                <img id="product-photo" alt="Фото товара" style="display:none;width:100%;height:280px;object-fit:contain;background:#fff;border:1px solid rgba(15,23,42,0.06);border-radius:8px;cursor:pointer;" />
            </div>

            <div class="card" id="generator-card" style="display:none;max-width:100%;">
                <h1 style="margin:0 0 16px 0;">Опознание товара</h1>

                <div id="nm-group" style="margin-bottom:14px;">
                    <div style="font-weight:600;margin-bottom:6px;">Номенклатура</div>
                    <input id="nm-input" class="input" type="text" placeholder="Введите номенклатуру" style="width:100%;max-width:100%;box-sizing:border-box;" />
                </div>

                <div id="description-group" style="margin-bottom:14px;display:none;">
                    <div style="font-weight:600;margin-bottom:6px;">Наименование</div>
                    <input id="description-input" class="input" type="text" placeholder="Введите наименование" style="width:100%;max-width:100%;box-sizing:border-box;" />
                </div>

                <div id="brand-group" style="margin-bottom:14px;display:none;">
                    <div style="font-weight:600;margin-bottom:6px;">Бренд</div>
                    <input id="brand-value" class="input" type="text" readonly placeholder="Бренд будет подтянут автоматически" style="width:100%;max-width:100%;box-sizing:border-box;background:#f8fafc;" />
                </div>

                <div id="sticker-group" style="margin-bottom:14px;display:none;">
                    <div style="font-weight:600;margin-bottom:6px;">Отсканируйте новый стикер товара</div>
                    <input id="new-sticker-input" class="input" type="text" readonly placeholder="Сканируйте стикер" style="width:100%;max-width:100%;box-sizing:border-box;" />
                    <div style="font-size:13px;color:#475569;margin-top:6px;">Ручной ввод отключен. Используйте только сканер.</div>
                </div>

                <div id="decoded-group" style="display:none;margin-bottom:16px;">
                    <div style="font-weight:600;margin-bottom:6px;">Распознанный ШК</div>
                    <div id="decoded-sticker-value" style="font-size:18px;font-weight:600;"></div>
                    <div id="decoded-barcode-value" style="font-size:13px;color:#475569;margin-top:4px;"></div>
                </div>

                <button id="assign-btn" class="btn btn-rect" style="display:none;">Присвоить стикер</button>
            </div>

            <div class="card" id="pure-losses-group" style="display:none;max-width:100%;">
                <div style="font-weight:600;margin-bottom:8px;">Чистые списания</div>
                <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;">
                    <input
                        id="pure-losses-search-input"
                        class="input"
                        type="text"
                        placeholder="Ручной поиск: НМ, наименование, бренд"
                        style="flex:1;min-width:220px;max-width:100%;box-sizing:border-box;"
                    />
                    <button id="pure-losses-search-btn" class="btn btn-outline" type="button">Поиск</button>
                </div>
                <div id="pure-losses-status" style="font-size:12px;color:#64748b;margin-bottom:8px;"></div>
                <div id="pure-losses-list" class="pure-losses-list"></div>
            </div>
        </div>
    </div>
</main>

<div id="toasts" class="toasts"></div>
</body>
</html>
