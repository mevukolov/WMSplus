<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>WMS+</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="https://raw.githubusercontent.com/mevukolov/WMSplus/refs/heads/main/icons/wms_icon.ico" type="image/x-icon" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="ui.js" defer></script>
    <script src="transfer_to_identification.js" defer></script>
</head>

<body>
<div id="menu-overlay" class="menu-overlay"></div>

<header class="header">
    <button class="btn btn-round header-btn" id="menu-btn">☰</button>
    <span class="header-title" id="header-wh"></span>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
        <span id="user-name-small" class="user-name" aria-hidden="true"></span>
        <button class="btn btn-round header-btn" id="logout-btn">⎋</button>
    </div>
</header>

<div id="sidebar" class="sidebar">
    <div class="sidebar-content"></div>
</div>

<main class="wrap" style="max-width:1100px;margin-top:90px;">
    <div id="mh-block" class="card" style="display:none;margin-bottom:20px;">
        <div style="font-size:18px;font-weight:600;">Вы работаете с МХ:</div>
        <div id="mh-name" style="font-size:20px;margin-top:4px;"></div>
    </div>

    <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;">
        <div class="card" id="generator-card" style="display:none;flex:1 1 620px;min-width:320px;">
            <h1 style="margin:0 0 16px 0;">Опознание товара</h1>

            <div id="nm-group" style="margin-bottom:14px;">
                <div style="font-weight:600;margin-bottom:6px;">Номенклатура</div>
                <input id="nm-input" class="input" type="text" placeholder="Введите номенклатуру" style="width:100%;max-width:560px;box-sizing:border-box;" />
            </div>

            <div id="description-group" style="margin-bottom:14px;display:none;">
                <div style="font-weight:600;margin-bottom:6px;">Наименование</div>
                <input id="description-input" class="input" type="text" placeholder="Введите наименование" style="width:100%;max-width:560px;box-sizing:border-box;" />
            </div>

            <div id="sticker-group" style="margin-bottom:14px;display:none;">
                <div style="font-weight:600;margin-bottom:6px;">Отсканируйте новый стикер товара</div>
                <input id="new-sticker-input" class="input" type="text" readonly placeholder="Сканируйте стикер" style="width:100%;max-width:560px;box-sizing:border-box;" />
                <div style="font-size:13px;color:#475569;margin-top:6px;">Ручной ввод отключен. Используйте только сканер.</div>
            </div>

            <div id="decoded-group" style="display:none;margin-bottom:16px;">
                <div style="font-weight:600;margin-bottom:6px;">Распознанный ШК</div>
                <div id="decoded-sticker-value" style="font-size:18px;font-weight:600;"></div>
                <div id="decoded-barcode-value" style="font-size:13px;color:#475569;margin-top:4px;"></div>
            </div>

            <button id="assign-btn" class="btn btn-rect" style="display:none;">Присвоить стикер</button>
        </div>

        <div class="card" id="photo-group" style="display:none;width:280px;max-width:100%;flex:0 0 280px;">
            <div style="font-weight:600;margin-bottom:6px;">Фото товара</div>
            <div id="photo-status" style="font-size:13px;color:#475569;margin-bottom:8px;"></div>
            <img id="product-photo" alt="Фото товара" style="display:none;width:100%;height:280px;object-fit:contain;background:#fff;border:1px solid rgba(15,23,42,0.06);border-radius:8px;cursor:pointer;" />
        </div>
    </div>
</main>

<div id="toasts" class="toasts"></div>
</body>
</html>
