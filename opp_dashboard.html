<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>WMS+ — Динамика ОПП</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="https://raw.githubusercontent.com/mevukolov/WMSplus/refs/heads/main/icons/wms_icon.ico" type="image/x-icon" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="ui.js" defer></script>
    <script src="opp_dashboard.js?v=20260408_09" defer></script>

    <style>
        .opp-toolbar {
            display: grid;
            grid-template-columns: minmax(160px, 210px) minmax(160px, 210px) auto auto;
            gap: 10px 12px;
            align-items: end;
            margin-bottom: 12px;
        }

        .opp-field {
            min-width: 0;
        }

        .opp-field .input {
            width: 100%;
            box-sizing: border-box;
        }

        .opp-detail-title {
            margin: 0 0 10px 0;
            font-size: 16px;
            font-weight: 700;
        }

        .gsheet-status {
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 14px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            background: #f8fafc;
            color: #334155;
        }

        .gsheet-status.success {
            border-color: rgba(22, 163, 74, 0.25);
            background: rgba(22, 163, 74, 0.08);
            color: #166534;
        }

        .gsheet-status.error {
            border-color: rgba(239, 68, 68, 0.25);
            background: rgba(239, 68, 68, 0.08);
            color: #991b1b;
        }

        .gsheet-error-list {
            margin-top: 10px;
            padding: 10px 12px;
            border: 1px solid rgba(239, 68, 68, 0.22);
            background: rgba(239, 68, 68, 0.06);
            border-radius: 10px;
            font-size: 14px;
            color: #7f1d1d;
            display: none;
            white-space: pre-line;
        }

        .opp-toolbar .btn {
            height: 40px;
            min-width: 110px;
            padding: 8px 12px;
        }

        .opp-page-title-row {
            margin: 0 0 14px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .opp-page-title-row #page-title {
            margin: 0;
        }

        .opp-page-title-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-left: auto;
        }

        .opp-deadline-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }

        .opp-deadline-card {
            background: #f6f7f8;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px;
            position: relative;
        }

        .opp-deadline-card.opp-status-green {
            border-color: rgba(22, 163, 74, 0.45);
            background: rgba(22, 163, 74, 0.1);
        }

        .opp-deadline-card.opp-status-yellow {
            border-color: rgba(245, 158, 11, 0.5);
            background: rgba(245, 158, 11, 0.14);
        }

        .opp-deadline-card.opp-status-red {
            border-color: rgba(239, 68, 68, 0.52);
            background: rgba(239, 68, 68, 0.14);
        }

        .opp-deadline-key {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 6px;
            padding-right: 28px;
        }

        .opp-deadline-target {
            font-size: 13px;
            color: #475569;
            min-height: 34px;
            margin-bottom: 8px;
        }

        .opp-deadline-progress {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 8px;
        }

        .opp-deadline-progress-value {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
        }

        .opp-deadline-progress-label {
            font-size: 12px;
            color: #64748b;
            text-align: right;
        }

        .opp-shift-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }

        .opp-shift-card {
            background: #f6f7f8;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: transform .15s ease, box-shadow .15s ease;
        }

        .opp-shift-card.opp-status-green {
            border-color: rgba(22, 163, 74, 0.45);
            background: rgba(22, 163, 74, 0.1);
        }

        .opp-shift-card.opp-status-yellow {
            border-color: rgba(245, 158, 11, 0.5);
            background: rgba(245, 158, 11, 0.14);
        }

        .opp-shift-card.opp-status-red {
            border-color: rgba(239, 68, 68, 0.52);
            background: rgba(239, 68, 68, 0.14);
        }

        .opp-shift-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, .12);
        }

        .opp-shift-date {
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .opp-shift-value {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 4px;
        }

        .opp-shift-meta {
            font-size: 12px;
            color: #64748b;
        }

        #calendar-modal {
            z-index: 760;
        }

        #shift-modal {
            z-index: 780;
        }

        .opp-shift-status-summary {
            border: 1px solid rgba(15,23,42,0.1);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 10px;
            background: #f8fafc;
        }

        .opp-shift-status-summary-title {
            margin: 0 0 6px 0;
            font-size: 13px;
            font-weight: 700;
            color: #334155;
        }

        .opp-shift-status-summary-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .opp-shift-status-chip {
            border: 1px solid rgba(15,23,42,0.1);
            border-radius: 999px;
            padding: 4px 9px;
            font-size: 12px;
            color: #1e293b;
            background: #ffffff;
        }

        .opp-breakdown-wrap {
            height: 290px;
            margin-bottom: 12px;
            border: 1px solid rgba(15,23,42,0.08);
            border-radius: 10px;
            padding: 10px;
            background: #f8fafc;
        }

        .opp-dashboard-layout {
            display: grid;
            grid-template-columns: 320px minmax(0, 1fr);
            gap: 12px;
            align-items: start;
            max-width: 1880px;
            margin: 0 auto;
            padding: 0 10px;
        }

        .opp-dashboard-center.wrap {
            max-width: none !important;
            width: 100%;
            margin: 0;
        }

        .opp-side-wrap.wrap {
            max-width: none !important;
            width: 100%;
            margin: 0;
        }

        .opp-side-card {
            position: sticky;
            top: 84px;
            height: calc(100vh - 116px);
            max-height: calc(100vh - 116px);
            overflow-y: auto;
            overflow-x: hidden;
            box-sizing: border-box;
            z-index: 1;
        }

        .opp-side-card .status-header {
            position: static;
            top: auto;
            z-index: auto;
            background: transparent;
            padding: 0;
            border-bottom: 0;
            margin-bottom: 10px;
        }

        .opp-side-card .opp-breakdown-wrap {
            height: 300px;
            margin-bottom: 0;
        }

        .opp-upload-indicator {
            position: absolute;
            right: 10px;
            top: 10px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 12px;
            font-weight: 700;
            line-height: 20px;
            text-align: center;
            cursor: help;
            user-select: none;
        }

        .opp-upload-indicator.ok {
            color: #166534;
            background: rgba(22, 163, 74, 0.18);
            border: 1px solid rgba(22, 163, 74, 0.38);
        }

        .opp-upload-indicator.bad {
            color: #991b1b;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.45);
        }

        .opp-deadline-employees {
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px dashed rgba(15, 23, 42, 0.12);
            font-size: 12px;
            color: #334155;
            line-height: 1.25;
            text-align: center;
            min-height: 18px;
        }

        .opp-unfinished-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }

        .opp-unfinished-card {
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 12px;
            background: #f8fafc;
            padding: 10px;
        }

        .opp-unfinished-card-title {
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 4px;
        }

        .opp-unfinished-card-sheets {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 4px;
        }

        .opp-unfinished-card-total {
            font-size: 12px;
            color: #475569;
            margin-bottom: 8px;
        }

        .opp-unfinished-list {
            display: grid;
            gap: 6px;
        }

        .opp-unfinished-row {
            border: 1px dashed rgba(15, 23, 42, 0.1);
            border-radius: 8px;
            padding: 6px 8px;
            background: #ffffff;
            display: grid;
            gap: 2px;
        }

        .opp-unfinished-row-date {
            font-size: 12px;
            color: #334155;
            font-weight: 600;
        }

        .opp-unfinished-row-metrics {
            font-size: 12px;
            color: #64748b;
        }

        .opp-shift-overall {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }

        .opp-shift-overall-item {
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 10px;
            background: #ffffff;
            padding: 10px 12px;
        }

        .opp-shift-overall-label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 4px;
            line-height: 1.35;
        }

        .opp-shift-overall-value {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
        }

        .opp-month-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 6px;
            margin-top: 8px;
        }

        .opp-month-grid.opp-month-grid-main {
            grid-template-columns: repeat(5, minmax(0, 1fr));
            margin-top: 0;
        }

        .opp-month-card {
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 12px;
            background: #f8fafc;
            padding: 4px 6px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 54px;
        }

        .opp-month-card.opp-month-card-good {
            border-color: rgba(22, 163, 74, 0.42);
            background: rgba(22, 163, 74, 0.13);
        }

        .opp-month-card.opp-month-card-bad {
            border-color: rgba(239, 68, 68, 0.45);
            background: rgba(239, 68, 68, 0.14);
        }

        .opp-month-card.opp-month-card-warn {
            border-color: rgba(245, 158, 11, 0.5);
            background: rgba(245, 158, 11, 0.16);
        }

        .opp-month-label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 1px;
            line-height: 1.2;
            text-align: center;
        }

        .opp-month-value {
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
            text-align: center;
            line-height: 1.15;
            word-break: break-word;
        }

        .opp-lag-panel {
            border: 1px solid rgba(15, 23, 42, 0.06);
            border-radius: 12px;
            background: #f8fafc;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-height: 72px;
        }

        .opp-lag-main-title {
            font-size: 11px;
            color: #64748b;
            line-height: 1.1;
        }

        .opp-lag-main-value {
            font-size: 24px;
            font-weight: 800;
            color: #0f172a;
            line-height: 1;
        }

        .opp-lag-list {
            display: grid;
            gap: 2px;
            margin-top: 2px;
        }

        .opp-lag-item {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            font-size: 11px;
            color: #334155;
            line-height: 1.2;
        }

        .opp-lag-item-key {
            color: #64748b;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .opp-lag-item-value {
            font-weight: 700;
            color: #0f172a;
            flex: 0 0 auto;
        }

        .opp-pure-missing-list {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
        }

        .opp-pure-missing-badge {
            width: 24px;
            min-height: 24px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: #b91c1c;
            background: #fee2e2;
            border: 1px solid #fca5a5;
            line-height: 1;
        }

        .opp-unfinished-mini-panel {
            gap: 6px;
        }

        .opp-unfinished-mini-list {
            display: grid;
            gap: 8px;
        }

        .opp-unfinished-mini-group {
            border-top: 1px solid rgba(15, 23, 42, 0.08);
            padding-top: 6px;
        }

        .opp-unfinished-mini-group:first-child {
            border-top: 0;
            padding-top: 0;
        }

        .opp-unfinished-mini-title {
            font-size: 12px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 4px;
        }

        .opp-unfinished-mini-row {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            font-size: 11px;
            color: #334155;
            line-height: 1.25;
            margin-bottom: 2px;
        }

        .opp-unfinished-mini-date {
            color: #64748b;
        }

        .opp-unfinished-mini-count {
            font-weight: 700;
            color: #0f172a;
            flex: 0 0 auto;
        }

        @media (max-width: 1480px) {
            .opp-dashboard-layout {
                grid-template-columns: 280px minmax(0, 1fr);
            }
        }

        @media (max-width: 1320px) {
            .opp-dashboard-layout {
                grid-template-columns: 1fr;
            }

            .opp-dashboard-center {
                order: 1;
            }

            .opp-side-left {
                order: 2;
            }

            .opp-side-card {
                position: static;
                height: auto;
                max-height: none;
                overflow: visible;
            }
        }

        @media (max-width: 1180px) {
            .opp-month-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .opp-month-grid.opp-month-grid-main {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 860px) {
            .opp-month-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .opp-month-grid.opp-month-grid-main {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 560px) {
            .opp-month-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 760px) {
            .opp-toolbar {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div id="menu-overlay" class="menu-overlay"></div>

<header class="header">
    <button class="btn btn-round header-btn" id="menu-btn">☰</button>
    <span class="header-title" id="header-wh"></span>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
        <span id="user-name-small" class="user-name" aria-hidden="true"></span>
        <button class="btn btn-round header-btn" id="logout-btn">⎋</button>
    </div>
</header>

<div id="sidebar" class="sidebar">
    <div class="sidebar-content"></div>
</div>

<div class="opp-dashboard-layout">
    <aside class="wrap opp-side-wrap opp-side-left">
        <div class="card opp-side-card">
            <div class="status-header">
                <div class="status-center" style="grid-column:1 / -1;">
                    <div class="status-code" style="font-size:22px;">Отставание</div>
                </div>
            </div>
            <div id="dashboard-lag-panel-content" class="opp-lag-panel" style="margin-bottom:12px;">
                <div class="muted">Нет данных для отображения.</div>
            </div>

            <div id="dashboard-pure-backlog-panel" class="opp-lag-panel" style="margin-bottom:12px;">
                <div class="muted">Нет данных для отображения.</div>
            </div>

            <div class="status-header">
                <div class="status-center" style="grid-column:1 / -1;">
                    <div class="status-code" style="font-size:22px;">Дорогостой без разбора</div>
                </div>
            </div>
            <div id="dashboard-unfinished-panel-content" class="opp-lag-panel opp-unfinished-mini-panel" style="margin-bottom:12px;">
                <div class="muted">Нет данных для отображения.</div>
            </div>

            <div class="status-header">
                <div class="status-center" style="grid-column:1 / -1;">
                    <div class="status-code" style="font-size:22px;">Статусы разбора за смену</div>
                </div>
            </div>
            <div id="dashboard-breakdown-wrap" class="opp-breakdown-wrap" style="display:none;">
                <canvas id="dashboard-breakdown-chart"></canvas>
            </div>
            <div id="dashboard-breakdown-empty" class="muted" style="display:none;"></div>
        </div>
    </aside>

    <main class="wrap opp-dashboard-center" style="max-width:1200px;">
        <div class="card">
            <div class="opp-page-title-row">
                <h1 id="page-title">Динамика ОПП</h1>
                <div id="page-title-actions" class="opp-page-title-actions"></div>
            </div>

            <div id="gsheet-status" class="gsheet-status">Загрузка...</div>
            <div id="gsheet-errors" class="gsheet-error-list"></div>

            <div id="summary-wrap"></div>
        </div>
    </main>
</div>

<div id="toasts" class="toasts"></div>
</body>
</html>
