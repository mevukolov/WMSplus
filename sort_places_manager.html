<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>WMS+ — Управление МХ КС</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="https://raw.githubusercontent.com/mevukolov/WMSplus/refs/heads/main/icons/wms_icon.ico" type="image/x-icon">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="ui.js" defer></script>
    <script src="sort_places_manager.js" defer></script>

    <style>
        body {
            overflow: hidden;
            padding: 0 10px 10px;
        }

        .places-layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 330px;
            gap: 12px;
            align-items: stretch;
            max-width: 1880px;
            margin: 0 auto;
            margin-top: 62px;
            height: calc(100vh - 96px);
        }

        .places-main.wrap,
        .places-side.wrap {
            max-width: none !important;
            width: 100%;
            margin: 0;
            display: block;
            height: 100%;
            min-height: 0;
            box-sizing: border-box;
            padding-top: 10px !important;
        }

        .places-main .card,
        .places-side .card {
            height: 100%;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .page-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .page-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .status-line {
            margin-top: 10px;
            font-size: 12px;
            color: #475569;
        }

        .groups-canvas {
            margin-top: 10px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 14px;
            background: #f8fafc;
            padding: 10px;
            flex: 1 1 auto;
            min-height: 0;
            overflow: auto;
        }

        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 10px;
            align-items: start;
        }

        .groups-empty {
            display: none;
            padding: 16px;
            border: 1px dashed rgba(15, 23, 42, 0.2);
            border-radius: 10px;
            background: #ffffff;
            color: #64748b;
            text-align: center;
        }

        .group-card {
            border: 1.5px solid rgba(15, 23, 42, 0.82);
            border-radius: 18px;
            background: #f7f8fa;
            padding: 9px 10px 7px;
        }

        .group-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }

        .group-head-left {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .group-title {
            margin: 0;
            font-size: 16px;
            color: #111827;
            font-weight: 700;
            line-height: 1.2;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .group-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mini-btn {
            width: 30px;
            height: 30px;
            border-radius: 9px;
            padding: 0;
            font-size: 13px;
            line-height: 1;
        }

        .group-dropzone {
            min-height: 116px;
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 2px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(104px, 1fr));
            gap: 8px;
            align-items: start;
            transition: border-color .12s ease, background-color .12s ease;
        }

        .group-dropzone.is-drop-target {
            border-color: #2563eb;
            background: #eff6ff;
        }

        .group-empty-slot {
            border: 1px dashed rgba(15, 23, 42, 0.2);
            border-radius: 10px;
            padding: 10px;
            color: #94a3b8;
            font-size: 12px;
            text-align: center;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .group-footer {
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .group-weight {
            margin: 0;
            font-size: 20px;
            line-height: 1;
            color: #111827;
            font-weight: 700;
        }

        .pm-square {
            width: 100%;
            min-height: 102px;
            border: 3px solid #0f172a;
            border-radius: 16px;
            background: #fff;
            box-sizing: border-box;
            padding: 8px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            position: relative;
            cursor: grab;
            user-select: none;
            transition: box-shadow .12s ease, background-color .12s ease, border-color .12s ease;
        }

        .pm-square:active {
            cursor: grabbing;
        }

        .pm-square.secondary {
            border-style: dashed;
            border-width: 2px;
        }

        .pm-square.is-dragging {
            opacity: 0.56;
        }

        .pm-square-name {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: #111827;
            line-height: 1.15;
            text-align: center;
        }

        .pm-square-id {
            margin: 0;
            font-size: 10px;
            color: #64748b;
            line-height: 1;
        }

        .pm-square-edit {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 24px;
            height: 24px;
            border-radius: 8px;
            border: 1px solid rgba(15, 23, 42, 0.12);
            background: #f8fafc;
            color: #334155;
            padding: 0;
            cursor: pointer;
            font-size: 12px;
            line-height: 1;
        }

        .pm-square-badge {
            margin: 0;
            font-size: 10px;
            color: #0f172a;
            font-weight: 700;
            line-height: 1;
            min-height: 12px;
        }

        .side-card {
            padding: 14px 16px;
            gap: 8px;
            overflow: hidden;
        }

        .side-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .side-title {
            margin: 0;
            font-size: 19px;
            color: #111827;
        }

        .side-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .side-add-btn {
            width: 32px;
            height: 32px;
            border-radius: 9px;
            font-size: 18px;
            line-height: 1;
            padding: 0;
        }

        .side-search {
            margin-top: 2px;
        }

        .side-search .input {
            width: 100%;
            box-sizing: border-box;
        }

        .side-sections {
            margin-top: 4px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1 1 auto;
            min-height: 0;
        }

        .side-section {
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 12px;
            background: #f8fafc;
            padding: 8px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .side-section.archive {
            flex: 1 1 44%;
        }

        .side-section.free {
            flex: 1 1 56%;
        }

        .side-section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 7px;
        }

        .side-section-title {
            margin: 0;
            font-size: 13px;
            color: #334155;
            font-weight: 700;
        }

        .side-section-count {
            margin: 0;
            font-size: 11px;
            color: #64748b;
            font-weight: 700;
        }

        .side-zone {
            flex: 1 1 auto;
            min-height: 110px;
            border: 1px dashed rgba(15, 23, 42, 0.2);
            border-radius: 10px;
            background: #fff;
            padding: 8px;
            overflow: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
            gap: 8px;
            align-content: start;
            transition: border-color .12s ease, background-color .12s ease;
        }

        .side-zone.is-drop-target {
            border-color: #2563eb;
            background: #eff6ff;
        }

        .side-empty {
            border: 1px dashed rgba(15, 23, 42, 0.16);
            border-radius: 10px;
            color: #94a3b8;
            font-size: 12px;
            text-align: center;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }

        .side-zone .pm-square {
            min-height: 88px;
        }

        .field-note {
            margin: 6px 0 0 0;
            color: #64748b;
            font-size: 11px;
            line-height: 1.25;
        }

        .secondary-wrap {
            margin-top: 6px;
            border: 1px solid rgba(15, 23, 42, 0.1);
            border-radius: 10px;
            padding: 9px 10px;
            background: #f8fafc;
        }

        .secondary-check {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #334155;
            font-weight: 700;
            user-select: none;
            cursor: pointer;
        }

        .secondary-check input {
            margin: 0;
        }

        @media (max-width: 1300px) {
            .places-layout {
                grid-template-columns: minmax(0, 1fr) 310px;
            }
        }

        @media (max-width: 1150px) {
            body {
                overflow: auto;
                padding: 0 8px 8px;
            }

            .places-layout {
                grid-template-columns: 1fr;
                height: auto;
                margin-top: 60px;
            }

            .places-main .card,
            .places-side .card {
                height: auto;
                min-height: 0;
            }

            .groups-canvas {
                min-height: 340px;
                max-height: none;
            }

            .side-zone {
                min-height: 160px;
            }
        }

        @media (max-width: 900px) {
            .groups-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div id="menu-overlay" class="menu-overlay"></div>

<header class="header">
    <button class="btn btn-round header-btn" id="menu-btn">☰</button>
    <span class="header-title" id="header-wh"></span>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
        <span id="user-name-small" class="user-name"></span>
        <button class="btn btn-round header-btn" id="logout-btn">⎋</button>
    </div>
</header>

<div id="sidebar" class="sidebar">
    <div class="sidebar-content"></div>
</div>

<div class="places-layout">
    <main class="wrap places-main">
        <section class="card">
            <div class="page-head">
                <h1 style="margin:0;">Управление МХ КС</h1>
                <div class="page-actions">
                    <button id="btn-add-group" class="btn btn-outline" type="button">Добавить группу</button>
                    <button id="btn-reload" class="btn btn-rect" type="button">Обновить</button>
                </div>
            </div>

            <div id="status-line" class="status-line">Загрузка данных...</div>

            <div class="groups-canvas">
                <div id="groups-grid" class="groups-grid"></div>
                <div id="groups-empty" class="groups-empty">Нет активных групп сортировки.</div>
            </div>
        </section>
    </main>

    <aside class="wrap places-side">
        <section class="card side-card">
            <div class="side-head">
                <h2 class="side-title">КС</h2>
                <div class="side-actions">
                    <button id="btn-add-square" class="btn btn-rect side-add-btn" type="button" title="Добавить КС">+</button>
                </div>
            </div>

            <div class="side-search">
                <input id="square-search-input" class="input" type="text" placeholder="Поиск КС..." autocomplete="off">
            </div>

            <div class="side-sections">
                <section class="side-section free">
                    <div class="side-section-head">
                        <p class="side-section-title">Свободные КС</p>
                        <p id="free-count" class="side-section-count">0</p>
                    </div>
                    <div id="free-zone" class="side-zone" data-role="drop-free"></div>
                </section>

                <section class="side-section archive">
                    <div class="side-section-head">
                        <p class="side-section-title">Архив</p>
                        <p id="archive-count" class="side-section-count">0</p>
                    </div>
                    <div id="archive-zone" class="side-zone" data-role="drop-archive"></div>
                </section>
            </div>
        </section>
    </aside>
</div>

<div id="group-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content" style="max-width:520px;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;">
            <h2 id="group-modal-title" style="margin:0;">Добавить группу</h2>
            <button id="group-modal-close-top" class="btn btn-outline" type="button">Закрыть</button>
        </div>

        <div class="mb">
            <label for="group-name-input">Группа КС</label>
            <input id="group-name-input" class="input" type="text" placeholder="Например: 1">
        </div>

        <div class="mb">
            <label for="group-weight-input">Weight</label>
            <input id="group-weight-input" class="input" type="text" inputmode="numeric" placeholder="Например: 1000">
        </div>

        <div class="actions" style="margin-top:16px;justify-content:space-between;">
            <button id="group-delete-btn" class="btn btn-outline" type="button" style="display:none;">Удалить группу</button>
            <div style="display:flex;align-items:center;gap:8px;">
                <button id="group-save-btn" class="btn btn-rect" type="button">Сохранить</button>
                <button id="group-modal-close" class="btn btn-outline" type="button">Отмена</button>
            </div>
        </div>
    </div>
</div>

<div id="square-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content" style="max-width:560px;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;">
            <h2 id="square-modal-title" style="margin:0;">Добавить КС</h2>
            <button id="square-modal-close-top" class="btn btn-outline" type="button">Закрыть</button>
        </div>

        <div class="mb">
            <label>ID КС</label>
            <div id="square-id-preview" class="input" style="background:#f1f5f9;">—</div>
        </div>

        <div class="mb">
            <label for="square-name-input">Название КС</label>
            <input id="square-name-input" class="input" type="text" placeholder="Например: ННЛ КС 1">
        </div>

        <div class="mb">
            <label for="square-group-select">Группа КС</label>
            <select id="square-group-select" class="input"></select>
            <p class="field-note">Для КС без активной группы используйте «Свободные КС».</p>
        </div>

        <div class="secondary-wrap">
            <label class="secondary-check">
                <input id="square-secondary-check" type="checkbox">
                <span>Допка (is_secondary)</span>
            </label>
            <p class="field-note">Дополнительные КС (пунктир) заполняются в балансировке в последнюю очередь.</p>
        </div>

        <div class="actions" style="margin-top:16px;justify-content:space-between;">
            <button id="square-delete-btn" class="btn btn-outline" type="button" style="display:none;">Удалить КС</button>
            <div style="display:flex;align-items:center;gap:8px;">
                <button id="square-save-btn" class="btn btn-rect" type="button">Сохранить</button>
                <button id="square-modal-close" class="btn btn-outline" type="button">Отмена</button>
            </div>
        </div>
    </div>
</div>

<div id="toasts" class="toasts"></div>
</body>
</html>
