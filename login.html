<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WMS+ — Авторизация</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="https://raw.githubusercontent.com/mevukolov/WMSplus/refs/heads/main/icons/wms_icon.ico" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
  <script src="auth.js" defer></script>
  <style>
    body.login-page {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-color: #c9ad7f;
      background-image:
        url("https://raw.githubusercontent.com/mevukolov/WMSplus/refs/heads/main/icons/images/cardboard.png"),
        url("icons/cardboard.png");
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      font-family: "Arial", "Helvetica Neue", Helvetica, sans-serif;
      color: #101010;
    }

    .login-stage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 64px;
      box-sizing: border-box;
    }

    .login-card {
      width: min(420px, 92vw);
      aspect-ratio: 1 / 1;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
      padding: 24px 22px 22px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    .login-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .brand-title {
      font-size: 46px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .login-date {
      margin-top: 4px;
      font-size: 16px;
      font-weight: 600;
      color: #4b4b4b;
      font-variant-numeric: tabular-nums;
    }

    .qr-box {
      width: 170px;
      height: 170px;
      border: 0;
      border-radius: 0;
      padding: 0;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #qr-canvas {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
    }


    .login-subtitle {
      text-align: right;
      font-size: 16px;
      margin: 0 0 6px;
      padding-right: 8px;
    }

    .login-bottom {
      margin-top: auto;
    }

    .login-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1.5px solid #111;
      border-radius: 0;
    }

    .login-field {
      border-right: 1.5px solid #111;
    }

    .login-field:last-child {
      border-right: 0;
    }

    .login-input {
      width: 100%;
      padding: 14px 12px;
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 1px;
      border: 0;
      outline: 0;
      background: transparent;
      border-radius: 0;
      box-sizing: border-box;
    }

    .login-input::placeholder {
      color: #b8b8b8;
      font-weight: 600;
      letter-spacing: 0;
      font-size: 22px;
    }

    .login-input.password {
      letter-spacing: 2px;
    }

    .login-submit {
      margin-top: 0;
      width: 100%;
      height: 56px;
      border: 1.5px solid #111;
      border-top: 0;
      border-radius: 0;
      background: #ffffff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s ease, transform 0.12s ease;
    }

    .login-submit:hover {
      background: #f4f4f4;
    }

    .login-submit:active {
      transform: translateY(1px);
    }

    .login-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .login-error {
      margin: 0 2px 0;
      min-height: 0;
      font-size: 13px;
      color: #b91c1c;
      text-align: center;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    @media (max-width: 720px) {
      .login-stage {
        justify-content: center;
        padding: 24px;
      }

      .login-card {
        width: 100%;
      }

      .brand-title {
        font-size: 36px;
      }

      .login-date {
        font-size: 14px;
      }

      .login-input {
        font-size: 28px;
      }
    }
  </style>
</head>
<body class="login-page">
  <main class="login-stage">
    <section class="login-card" aria-label="Форма входа">
      <header class="login-head">
        <div>
          <div class="brand-title">WMS+</div>
          <div class="login-date" id="login-date">&nbsp;</div>
        </div>
        <div class="qr-box" aria-hidden="true">
          <canvas id="qr-canvas" width="170" height="170"></canvas>
        </div>
      </header>

      <div class="login-bottom">
        <div class="login-subtitle">Введите логин и пароль</div>
        <div class="login-form">
          <div class="login-fields">
            <label class="login-field">
              <span class="sr-only">ID пользователя</span>
              <input
                type="text"
                id="login-id"
                class="login-input"
                placeholder="ID"
                autocomplete="username"
                inputmode="numeric"
                autofocus
              >
            </label>
            <label class="login-field">
              <span class="sr-only">Пароль</span>
              <input
                type="password"
                id="login-pass"
                class="login-input password"
                placeholder="Пароль"
                autocomplete="current-password"
              >
            </label>
          </div>

          <button id="login-btn" class="login-submit" type="button" aria-label="Войти">
            <svg width="120" height="24" viewBox="0 0 120 24" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
              <line x1="0" y1="12" x2="100" y2="12" stroke="#111" stroke-width="3" stroke-linecap="square"/>
              <path d="M96 4 L118 12 L96 20" stroke="#111" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
            </svg>
          </button>
        </div>

        <p id="login-error" class="login-error" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const dateEl = document.getElementById('login-date');
      if (dateEl) {
        const updateDateTime = () => {
          const now = new Date();
          const datePart = now.toLocaleDateString('ru-RU', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric'
          });
          const timePart = now.toLocaleTimeString('ru-RU', {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
          });
          dateEl.textContent = `${datePart} ${timePart}`;
        };

        updateDateTime();
        setInterval(updateDateTime, 1000);
      }

      const loginButton = document.getElementById('login-btn');
      const loginInputs = [document.getElementById('login-id'), document.getElementById('login-pass')];

      loginInputs.forEach((input) => {
        if (!input || !loginButton) return;
        input.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') {
            event.preventDefault();
            loginButton.click();
          }
        });
      });

      // Если пользователь уже авторизован, сразу редирект
      if (localStorage.getItem('user')) {
        window.location.href = 'index.html';
      }

      // Рисуем QR с закодированным текстом (без внешних библиотек)
      const canvas = document.getElementById('qr-canvas');
      if (canvas && canvas.getContext) {
        const qrText = 'Добро пожаловать в WMS+';

        const size = 29; // QR version 3
        const dataCodewords = 44;
        const ecCodewords = 26;

        const modules = Array.from({ length: size }, () => Array(size).fill(null));
        const isFunction = Array.from({ length: size }, () => Array(size).fill(false));

        const setFunctionModule = (x, y, val) => {
          if (x < 0 || y < 0 || x >= size || y >= size) return;
          modules[y][x] = val ? 1 : 0;
          isFunction[y][x] = true;
        };

        const drawFinder = (x, y) => {
          for (let dy = -1; dy <= 7; dy += 1) {
            for (let dx = -1; dx <= 7; dx += 1) {
              const xx = x + dx;
              const yy = y + dy;
              if (xx < 0 || yy < 0 || xx >= size || yy >= size) continue;
              const isSeparator = dx === -1 || dy === -1 || dx === 7 || dy === 7;
              if (isSeparator) {
                setFunctionModule(xx, yy, 0);
              } else {
                const isBorder = dx === 0 || dx === 6 || dy === 0 || dy === 6;
                const isCenter = dx >= 2 && dx <= 4 && dy >= 2 && dy <= 4;
                setFunctionModule(xx, yy, isBorder || isCenter ? 1 : 0);
              }
            }
          }
        };

        const drawAlignment = (cx, cy) => {
          for (let dy = -2; dy <= 2; dy += 1) {
            for (let dx = -2; dx <= 2; dx += 1) {
              const xx = cx + dx;
              const yy = cy + dy;
              const dist = Math.max(Math.abs(dx), Math.abs(dy));
              const isBlack = dist === 2 || (dx === 0 && dy === 0);
              setFunctionModule(xx, yy, isBlack ? 1 : 0);
            }
          }
        };

        const reserveFormat = () => {
          for (let i = 0; i <= 5; i += 1) setFunctionModule(8, i, 0);
          setFunctionModule(8, 7, 0);
          setFunctionModule(8, 8, 0);
          setFunctionModule(7, 8, 0);
          for (let i = 0; i <= 5; i += 1) setFunctionModule(5 - i, 8, 0);

          for (let i = 0; i <= 7; i += 1) setFunctionModule(size - 1 - i, 8, 0);
          for (let i = 0; i <= 6; i += 1) setFunctionModule(8, size - 1 - i, 0);
        };

        drawFinder(0, 0);
        drawFinder(size - 7, 0);
        drawFinder(0, size - 7);

        for (let i = 8; i <= size - 9; i += 1) {
          const val = i % 2 === 0 ? 1 : 0;
          setFunctionModule(i, 6, val);
          setFunctionModule(6, i, val);
        }

        drawAlignment(22, 22);
        setFunctionModule(8, size - 8, 1);
        reserveFormat();

        const EXP = new Array(512);
        const LOG = new Array(256);
        let x = 1;
        for (let i = 0; i < 255; i += 1) {
          EXP[i] = x;
          LOG[x] = i;
          x <<= 1;
          if (x & 0x100) x ^= 0x11d;
        }
        for (let i = 255; i < 512; i += 1) EXP[i] = EXP[i - 255];

        const gfMul = (a, b) => {
          if (a === 0 || b === 0) return 0;
          return EXP[LOG[a] + LOG[b]];
        };

        const polyMultiply = (p, q) => {
          const res = new Array(p.length + q.length - 1).fill(0);
          for (let i = 0; i < p.length; i += 1) {
            for (let j = 0; j < q.length; j += 1) {
              res[i + j] ^= gfMul(p[i], q[j]);
            }
          }
          return res;
        };

        const buildGenerator = (ecLen) => {
          let gen = [1];
          for (let i = 0; i < ecLen; i += 1) {
            gen = polyMultiply(gen, [1, EXP[i]]);
          }
          gen.shift();
          return gen;
        };

        const computeEC = (data, ecLen) => {
          const gen = buildGenerator(ecLen);
          const ec = new Array(ecLen).fill(0);
          data.forEach((byte) => {
            const factor = byte ^ ec[0];
            ec.shift();
            ec.push(0);
            for (let i = 0; i < ecLen; i += 1) {
              ec[i] ^= gfMul(gen[i], factor);
            }
          });
          return ec;
        };

        const textBytes = new TextEncoder().encode(qrText);
        const bits = [];
        const pushBits = (val, length) => {
          for (let i = length - 1; i >= 0; i -= 1) {
            bits.push((val >> i) & 1);
          }
        };

        pushBits(0b0100, 4);
        pushBits(textBytes.length, 8);
        textBytes.forEach((b) => pushBits(b, 8));
        pushBits(0, 4);
        while (bits.length % 8 !== 0) bits.push(0);

        const data = [];
        for (let i = 0; i < bits.length; i += 8) {
          let val = 0;
          for (let j = 0; j < 8; j += 1) {
            val = (val << 1) | bits[i + j];
          }
          data.push(val);
        }

        let padByte = 0xec;
        while (data.length < dataCodewords) {
          data.push(padByte);
          padByte = padByte === 0xec ? 0x11 : 0xec;
        }

        const ec = computeEC(data, ecCodewords);
        const codewords = data.concat(ec);
        const dataBits = [];
        codewords.forEach((byte) => {
          for (let i = 7; i >= 0; i -= 1) {
            dataBits.push((byte >> i) & 1);
          }
        });

        let bitIndex = 0;
        let upward = true;
        for (let col = size - 1; col > 0; col -= 2) {
          if (col === 6) col -= 1;
          for (let row = 0; row < size; row += 1) {
            const r = upward ? size - 1 - row : row;
            for (let c = 0; c < 2; c += 1) {
              const xPos = col - c;
              if (modules[r][xPos] !== null) continue;
              modules[r][xPos] = dataBits[bitIndex] || 0;
              bitIndex += 1;
            }
          }
          upward = !upward;
        }

        for (let y = 0; y < size; y += 1) {
          for (let xPos = 0; xPos < size; xPos += 1) {
            if (isFunction[y][xPos]) continue;
            if ((xPos + y) % 2 === 0) {
              modules[y][xPos] ^= 1;
            }
          }
        }

        const getFormatBits = (mask) => {
          const eccBits = 0; // M
          const dataVal = (eccBits << 3) | mask;
          let bitsVal = dataVal << 10;
          const generator = 0x537;
          for (let i = 14; i >= 10; i -= 1) {
            if ((bitsVal >> i) & 1) bitsVal ^= generator << (i - 10);
          }
          return ((dataVal << 10) | (bitsVal & 0x3ff)) ^ 0x5412;
        };

        const format = getFormatBits(0);
        const getBit = (val, i) => (val >> i) & 1;

        for (let i = 0; i <= 5; i += 1) setFunctionModule(8, i, getBit(format, i));
        setFunctionModule(8, 7, getBit(format, 6));
        setFunctionModule(8, 8, getBit(format, 7));
        setFunctionModule(7, 8, getBit(format, 8));
        for (let i = 9; i <= 14; i += 1) setFunctionModule(14 - i, 8, getBit(format, i));

        for (let i = 0; i <= 7; i += 1) setFunctionModule(size - 1 - i, 8, getBit(format, i));
        for (let i = 8; i <= 14; i += 1) setFunctionModule(8, size - 15 + i, getBit(format, i));

        const ctx = canvas.getContext('2d');
        const cell = Math.floor(canvas.width / size);
        const offset = Math.floor((canvas.width - cell * size) / 2);
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#000';

        for (let y = 0; y < size; y += 1) {
          for (let xPos = 0; xPos < size; xPos += 1) {
            if (modules[y][xPos]) {
              ctx.fillRect(offset + xPos * cell, offset + y * cell, cell, cell);
            }
          }
        }
      }
    })();
  </script>
</body>
</html>
