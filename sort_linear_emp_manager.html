<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>WMS+ — Управление линейными сотрудниками КС</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="https://raw.githubusercontent.com/mevukolov/WMSplus/refs/heads/main/icons/wms_icon.ico" type="image/x-icon">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="ui.js" defer></script>
    <script src="sort_linear_emp_manager.js" defer></script>

    <style>
        body {
            overflow: hidden;
            padding: 0 10px 10px;
        }

        .linear-emp-wrap {
            max-width: 1760px !important;
            margin-top: 62px;
            height: calc(100vh - 96px);
            min-height: 0;
            display: block;
            box-sizing: border-box;
            padding-top: 10px !important;
        }

        .linear-emp-page .input {
            width: 100%;
            box-sizing: border-box;
        }

        .linear-emp-page > .card {
            height: 100%;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .page-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .page-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filters-row {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .filter-search {
            flex: 1 1 260px;
            min-width: 240px;
            max-width: 420px;
        }

        .filter-sort {
            min-width: 220px;
        }

        .filter-block {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #334155;
            font-weight: 600;
        }

        .filter-block select {
            min-width: 160px;
        }

        .filter-check-wrap {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            background: #f8fafc;
            user-select: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
        }

        .filter-check-wrap input {
            margin: 0;
        }

        .status-line {
            margin-top: 10px;
            font-size: 12px;
            color: #475569;
        }

        .canvas-wrap {
            margin-top: 12px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 14px;
            background: #f8fafc;
            padding: 10px;
            flex: 1 1 auto;
            min-height: 0;
            box-sizing: border-box;
            overflow: hidden;
        }

        .employees-canvas {
            width: 100%;
            height: 100%;
            max-height: 100%;
            min-height: 0;
            overflow: auto;
            border-radius: 10px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            background: #fff;
            padding: 10px;
            box-sizing: border-box;
        }

        .employees-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            align-items: stretch;
        }

        .employees-empty {
            display: none;
            padding: 18px;
            border: 1px dashed rgba(15, 23, 42, 0.2);
            border-radius: 10px;
            background: #f8fafc;
            color: #64748b;
            text-align: center;
            font-size: 14px;
        }

        .employee-card {
            border: 1px solid rgba(15, 23, 42, 0.1);
            border-radius: 14px;
            background: #fff;
            padding: 10px;
            min-height: 176px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            height: auto;
            overflow: hidden;
        }

        .employee-card.is-stale {
            border-color: rgba(220, 38, 38, 0.45);
            background: #fef2f2;
            box-shadow: inset 0 0 0 1px rgba(220, 38, 38, 0.18);
        }

        .employee-main {
            text-align: center;
            display: grid;
            gap: 4px;
            margin-top: 2px;
        }

        .employee-id {
            margin: 0;
            font-size: 17px;
            font-weight: 800;
            color: #0f172a;
        }

        .employee-name {
            margin: 0;
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.22;
            min-height: 36px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .employee-shift {
            margin: 0;
        }

        .employee-shift-tags {
            min-height: 24px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }

        .employee-shift-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 700;
            line-height: 1;
            border: 1px solid rgba(15, 23, 42, 0.14);
            color: #111827;
            background: #e5e7eb;
            min-width: 58px;
        }

        .employee-shift-chip.day-1 {
            background: #fef3c7;
            border-color: rgba(217, 119, 6, 0.42);
            color: #92400e;
        }

        .employee-shift-chip.day-2 {
            background: #fed7aa;
            border-color: rgba(234, 88, 12, 0.42);
            color: #9a3412;
        }

        .employee-shift-chip.night-1 {
            background: #dbeafe;
            border-color: rgba(37, 99, 235, 0.4);
            color: #1e3a8a;
        }

        .employee-shift-chip.night-2 {
            background: #cffafe;
            border-color: rgba(8, 145, 178, 0.42);
            color: #0e7490;
        }

        .employee-perf {
            margin: 0;
            text-align: center;
            font-size: 19px;
            font-weight: 800;
            color: #111827;
        }

        .employee-date {
            margin: 0;
            text-align: center;
            font-size: 11px;
            color: #64748b;
            min-height: 30px;
            line-height: 1.25;
        }

        .employee-card.is-stale .employee-date {
            color: #b91c1c;
            font-weight: 700;
        }

        .employee-assignment {
            margin: 0;
            text-align: center;
            font-size: 11px;
            color: #475569;
            line-height: 1.2;
            min-height: 14px;
        }

        .employee-actions {
            margin-top: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .employee-actions .btn {
            flex: 1 1 calc(33.333% - 4px);
            min-width: 0;
            padding: 6px 8px;
            border-radius: 9px;
            font-size: 11px;
            line-height: 1.15;
            white-space: normal;
            word-break: break-word;
            min-height: 40px;
        }

        .employee-actions .btn-danger {
            border-color: rgba(220, 38, 38, 0.4);
            color: #b91c1c;
        }

        .perf-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            align-items: stretch;
        }

        .perf-grid .input {
            width: 100%;
            min-width: 0;
            box-sizing: border-box;
        }

        .perf-avg {
            margin-top: 8px;
            font-size: 12px;
            font-weight: 700;
            color: #334155;
        }

        .shift-picker-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-top: 4px;
        }

        .shift-picker-option {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            border-radius: 10px;
            border: 1px solid rgba(15, 23, 42, 0.12);
            padding: 8px 10px;
            font-size: 13px;
            font-weight: 700;
            color: #111827;
            background: #f3f4f6;
            cursor: pointer;
            user-select: none;
        }

        .shift-picker-option input {
            margin: 0;
            flex: 0 0 auto;
        }

        .shift-picker-option.day-1 {
            background: #fef3c7;
            border-color: rgba(217, 119, 6, 0.42);
            color: #92400e;
        }

        .shift-picker-option.day-2 {
            background: #fed7aa;
            border-color: rgba(234, 88, 12, 0.42);
            color: #9a3412;
        }

        .shift-picker-option.night-1 {
            background: #dbeafe;
            border-color: rgba(37, 99, 235, 0.4);
            color: #1e3a8a;
        }

        .shift-picker-option.night-2 {
            background: #cffafe;
            border-color: rgba(8, 145, 178, 0.42);
            color: #0e7490;
        }

        .readonly-field {
            display: block;
            width: 100%;
            box-sizing: border-box;
            border-radius: 12px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            padding: 10px 12px;
            background: #eef2f7;
            color: #475569;
            font-size: 14px;
        }

        @media (max-width: 1350px) {
            .employees-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 1100px) {
            .employees-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 760px) {
            body {
                overflow: auto;
                padding: 0 8px 8px;
            }

            .linear-emp-wrap {
                height: auto;
                margin-top: 60px;
            }

            .linear-emp-page > .card {
                height: auto;
            }

            .canvas-wrap {
                min-height: auto;
            }

            .employees-canvas {
                height: calc(100vh - 265px);
                min-height: 340px;
            }

            .employee-card {
                min-height: 180px;
            }

            .employees-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 520px) {
            .employees-grid {
                grid-template-columns: 1fr;
            }

            .shift-picker-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div id="menu-overlay" class="menu-overlay"></div>

<header class="header">
    <button class="btn btn-round header-btn" id="menu-btn">☰</button>
    <span class="header-title" id="header-wh"></span>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
        <span id="user-name-small" class="user-name"></span>
        <button class="btn btn-round header-btn" id="logout-btn">⎋</button>
    </div>
</header>

<div id="sidebar" class="sidebar">
    <div class="sidebar-content"></div>
</div>

<main class="wrap linear-emp-wrap linear-emp-page">
    <section class="card">
        <div class="page-head">
            <h1 style="margin:0;">Управление линейными сотрудниками КС</h1>
            <div class="page-actions">
                <button id="btn-reload" class="btn btn-outline" type="button">Обновить</button>
                <button id="btn-add-employee" class="btn btn-rect" type="button">Добавить сотрудника</button>
            </div>
        </div>

        <div class="filters-row">
            <label class="filter-block" for="filter-shift">
                Смена
                <select id="filter-shift" class="input">
                    <option value="all">Все</option>
                    <option value="День 1">День 1</option>
                    <option value="День 2">День 2</option>
                    <option value="Ночь 1">Ночь 1</option>
                    <option value="Ночь 2">Ночь 2</option>
                </select>
            </label>

            <label class="filter-check-wrap" for="filter-unassigned">
                <input id="filter-unassigned" type="checkbox">
                <span>Показать только незакрепленных сотрудников</span>
            </label>

            <input id="filter-search" class="input filter-search" type="text" placeholder="Поиск сотрудника...">

            <label class="filter-block filter-sort" for="filter-sort">
                Сортировка
                <select id="filter-sort" class="input">
                    <option value="name">По алфавиту</option>
                    <option value="performance_desc">По продуктивности</option>
                </select>
            </label>
        </div>

        <div id="status-line" class="status-line">Загрузка сотрудников...</div>

        <div class="canvas-wrap">
            <div id="employees-canvas" class="employees-canvas">
                <div id="employees-grid" class="employees-grid"></div>
                <div id="employees-empty" class="employees-empty">Сотрудники не найдены.</div>
            </div>
        </div>
    </section>
</main>

<div id="employee-create-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content" style="max-width:540px;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;">
            <h2 style="margin:0;">Добавить сотрудника</h2>
            <button id="employee-create-close-top" class="btn btn-outline" type="button">Закрыть</button>
        </div>

        <div class="mb">
            <label for="employee-create-id">ID</label>
            <input id="employee-create-id" class="input" type="text" inputmode="numeric" placeholder="linear_emp_id">
        </div>

        <div class="mb">
            <label for="employee-create-name">ФИО</label>
            <input id="employee-create-name" class="input" type="text" placeholder="linear_emp_name">
        </div>

        <div class="mb">
            <label>Смена (можно несколько)</label>
            <div id="employee-create-shifts" class="shift-picker-grid">
                <label class="shift-picker-option day-1">
                    <input type="checkbox" value="День 1">
                    День 1
                </label>
                <label class="shift-picker-option day-2">
                    <input type="checkbox" value="День 2">
                    День 2
                </label>
                <label class="shift-picker-option night-1">
                    <input type="checkbox" value="Ночь 1">
                    Ночь 1
                </label>
                <label class="shift-picker-option night-2">
                    <input type="checkbox" value="Ночь 2">
                    Ночь 2
                </label>
            </div>
        </div>

        <div class="mb">
            <label>Производительность за 3 последние смены</label>
            <div class="perf-grid">
                <input id="employee-create-performance-1" class="input" type="text" inputmode="numeric" placeholder="Смена 1">
                <input id="employee-create-performance-2" class="input" type="text" inputmode="numeric" placeholder="Смена 2">
                <input id="employee-create-performance-3" class="input" type="text" inputmode="numeric" placeholder="Смена 3">
            </div>
            <div id="employee-create-performance-avg" class="perf-avg">Средняя выработка: —</div>
        </div>

        <div class="actions" style="margin-top:16px;justify-content:flex-end;">
            <button id="employee-create-save" class="btn btn-rect" type="button">Сохранить</button>
            <button id="employee-create-close" class="btn btn-outline" type="button">Отмена</button>
        </div>
    </div>
</div>

<div id="employee-edit-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content" style="max-width:520px;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;">
            <h2 style="margin:0;">Редактировать сотрудника</h2>
            <button id="employee-edit-close-top" class="btn btn-outline" type="button">Закрыть</button>
        </div>

        <div class="mb">
            <label>ID</label>
            <div id="employee-edit-id" class="readonly-field">—</div>
        </div>

        <div class="mb">
            <label for="employee-edit-name">ФИО</label>
            <input id="employee-edit-name" class="input" type="text" placeholder="linear_emp_name">
        </div>

        <div class="mb">
            <label>Смена (можно несколько)</label>
            <div id="employee-edit-shifts" class="shift-picker-grid">
                <label class="shift-picker-option day-1">
                    <input type="checkbox" value="День 1">
                    День 1
                </label>
                <label class="shift-picker-option day-2">
                    <input type="checkbox" value="День 2">
                    День 2
                </label>
                <label class="shift-picker-option night-1">
                    <input type="checkbox" value="Ночь 1">
                    Ночь 1
                </label>
                <label class="shift-picker-option night-2">
                    <input type="checkbox" value="Ночь 2">
                    Ночь 2
                </label>
            </div>
        </div>

        <div class="actions" style="margin-top:16px;justify-content:flex-end;">
            <button id="employee-edit-save" class="btn btn-rect" type="button">Сохранить</button>
            <button id="employee-edit-close" class="btn btn-outline" type="button">Отмена</button>
        </div>
    </div>
</div>

<div id="employee-recalc-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content" style="max-width:540px;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;">
            <h2 style="margin:0;">Пересчитать продуктивность</h2>
            <button id="employee-recalc-close-top" class="btn btn-outline" type="button">Закрыть</button>
        </div>

        <div class="mb">
            <label>ID</label>
            <div id="employee-recalc-id" class="readonly-field">—</div>
        </div>

        <div class="mb">
            <label>ФИО</label>
            <div id="employee-recalc-name" class="readonly-field">—</div>
        </div>

        <div class="mb">
            <label>Производительность за 3 последние смены</label>
            <div class="perf-grid">
                <input id="employee-recalc-performance-1" class="input" type="text" inputmode="numeric" placeholder="Смена 1">
                <input id="employee-recalc-performance-2" class="input" type="text" inputmode="numeric" placeholder="Смена 2">
                <input id="employee-recalc-performance-3" class="input" type="text" inputmode="numeric" placeholder="Смена 3">
            </div>
            <div id="employee-recalc-performance-avg" class="perf-avg">Средняя выработка: —</div>
        </div>

        <div class="actions" style="margin-top:16px;justify-content:flex-end;">
            <button id="employee-recalc-save" class="btn btn-rect" type="button">Сохранить</button>
            <button id="employee-recalc-close" class="btn btn-outline" type="button">Отмена</button>
        </div>
    </div>
</div>

<div id="toasts" class="toasts"></div>
</body>
</html>
