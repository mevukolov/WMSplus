<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>WMS+</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="https://raw.githubusercontent.com/mevukolov/WMSplus/refs/heads/main/icons/wms_icon.ico" type="image/x-icon" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js" defer></script>
    <script src="ui.js" defer></script>
    <script src="transfer_to_identificarion_admin.js" defer></script>
    <style>
        .opp-toolbar {
            display: grid;
            grid-template-columns: repeat(4, minmax(110px, 1fr)) auto auto;
            gap: 10px 12px;
            align-items: end;
            margin-bottom: 16px;
        }

        .opp-field {
            min-width: 0;
        }

        .opp-field .input {
            width: 100%;
            box-sizing: border-box;
        }

        .opp-toolbar .btn {
            height: 40px;
            white-space: nowrap;
        }

        .opp-action-search {
            justify-self: start;
        }

        .opp-action-export {
            justify-self: end;
        }

        .opp-chart-wrap {
            height: 260px;
            position: relative;
            margin-top: 8px;
        }

        .opp-donut-wrap {
            height: 300px;
            position: relative;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(15, 23, 42, 0.08);
        }

        .opp-donut-title {
            margin: 0 0 10px 0;
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            color: #475569;
        }

        .opp-clickable {
            cursor: pointer;
            transition: transform .15s ease, box-shadow .15s ease;
        }

        .opp-clickable:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,.15);
        }

        .opp-detail-title {
            margin: 0 0 10px 0;
            font-size: 16px;
            font-weight: 700;
        }

        @media (max-width: 1040px) {
            .opp-toolbar {
                grid-template-columns: repeat(2, minmax(130px, 1fr));
            }

            .opp-action-search,
            .opp-action-export {
                justify-self: stretch;
            }
        }
    </style>
</head>
<body>
<div id="menu-overlay" class="menu-overlay"></div>

<header class="header">
    <button class="btn btn-round header-btn" id="menu-btn">☰</button>
    <span class="header-title" id="header-wh"></span>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
        <span id="user-name-small" class="user-name" aria-hidden="true"></span>
        <button class="btn btn-round header-btn" id="logout-btn">⎋</button>
    </div>
</header>

<div id="sidebar" class="sidebar">
    <div class="sidebar-content"></div>
</div>

<main class="wrap" style="max-width:1200px;">
    <div class="card">
        <h1 style="margin:0 0 16px 0;">Без ШК (админка)</h1>

        <div class="opp-toolbar">
            <div class="opp-field">
                <label>Дата с</label>
                <input id="date-from" class="input" placeholder="ДД.ММ.ГГГГ">
            </div>

            <div class="opp-field">
                <label>Время с</label>
                <input id="time-from" class="input" placeholder="ЧЧ:ММ:СС">
            </div>

            <div class="opp-field">
                <label>Дата по</label>
                <input id="date-to" class="input" placeholder="ДД.ММ.ГГГГ">
            </div>

            <div class="opp-field">
                <label>Время по</label>
                <input id="time-to" class="input" placeholder="ЧЧ:ММ:СС">
            </div>

            <button id="search-btn" class="btn btn-rect opp-action-search">Показать</button>

            <button id="export-btn" class="btn btn-rect opp-action-export">
                Выгрузить в Excel
            </button>
        </div>

        <div id="summary-wrap"></div>
    </div>
</main>

<div id="detail-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
        <h2 id="detail-modal-title" class="opp-detail-title"></h2>
        <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:10px;">
            <button id="detail-modal-export" class="btn btn-rect" style="display:none;">Выгрузить в Excel</button>
        </div>
        <div id="detail-modal-table-wrap"
             style="display:none;max-height:520px;overflow:auto;border-radius:10px;border:1px solid rgba(15,23,42,0.06);">
            <table class="table modal-table" style="min-width:1050px;">
                <thead>
                <tr>
                    <th>Дата</th>
                    <th>НМ</th>
                    <th>Наименование</th>
                    <th>ШК/Стикер</th>
                    <th>Источник кода</th>
                    <th>Операция</th>
                    <th>Сотрудник</th>
                    <th>МХ</th>
                </tr>
                </thead>
                <tbody id="detail-modal-result-body"></tbody>
            </table>
        </div>
        <div id="detail-modal-empty" class="muted" style="display:none;margin-bottom:12px;"></div>
        <div style="display:flex;justify-content:flex-end;">
            <button id="detail-modal-close" class="btn btn-rect">Закрыть</button>
        </div>
    </div>
</div>

<div id="toasts" class="toasts"></div>
</body>
</html>
